<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小明书院：题眼手账</title>
    <link rel="stylesheet" href="./styles.css?v=study-journal-20260623s" />
  </head>
  <body>
    <a class="skip-link" href="#stage">跳到游戏正文</a>

    <main class="rpg-shell" data-shell>
      <header class="game-hud">
        <div class="brand-lockup">
          <div>
            <h1>小明书院</h1>
            <p>题眼手账 · 文字题阵</p>
          </div>
        </div>

        <div class="hud-stats" data-hud-stats></div>

        <div class="hud-actions">
          <button type="button" class="hud-button" data-import-action>导入存档</button>
          <button type="button" class="hud-button" data-export-action>导出存档</button>
          <button type="button" class="hud-button danger" data-reset-action>重置</button>
        </div>
      </header>

      <section class="game-stage" id="stage" data-stage aria-live="polite"></section>
      <aside class="quest-panel" data-quest-panel></aside>
      <div class="toast" data-toast role="status" aria-live="polite"></div>
    </main>

  <script type="module" src="./app.js?v=study-journal-20260623s"></script>
</body>
</html>
